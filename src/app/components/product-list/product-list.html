<div class="product-grid">
  @for (item of products; track item.name) {
    <div class="product-card" [class.highlight]="item.price > 7.50">
      
      @if (item.price > 7.50) {
        <p class="promo-text"> Premium Choice</p>
      }

      <img [src]="item.image" [alt]="item.name" width="150">
      <h3>{{ item.name }}</h3>
      
      <p>Price: ${{ item.price.toFixed(2) }}</p>
      
      <button (click)="handleAddToCart(item)">Add to Cart</button>
    </div>
  } @empty {
    <p>The shop is currently empty!</p>
  }
</div>
